<!-- ============================================ -->
<!-- MODAL REUTILIZABLE (Global)                 -->
<!-- ============================================ -->
<div id="modalGlobal" class="modal-global" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="modalTitulo">Título del Modal</h3>
            <button id="modalCerrar" class="modal-btn-cerrar">&times;</button>
        </div>
        <div class="modal-body">
            <p id="modalMensaje">Mensaje del modal</p>
        </div>
        <div class="modal-footer" id="modalFooter">
            <button id="modalBtnCancelar" class="btn-modal-secundario">Cancelar</button>
            <button id="modalBtnConfirmar" class="btn-modal-primario">Confirmar</button>
        </div>
    </div>
</div>
